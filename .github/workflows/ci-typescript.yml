name: CI TypeScript

on:
  push:
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/magnetar-ui

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install Magnetar SDK dependencies
        working-directory: packages/magnetar-sdk
        run: npm ci --include=dev

      - name: Build Magnetar SDK
        working-directory: packages/magnetar-sdk
        run: npm run build

      - name: Install dependencies
        run: npm ci --include=dev

      - name: Build TypeScript UI
        run: npm run build:web
