name: CI (macOS)

on:
  push:
    branches:
      - "ci/**"
      - "master"
  pull_request:
    branches:
      - "ci/**"
      - "master"

permissions:
  contents: read

jobs:
  test:
    name: Test (macos, node${{ matrix.node-version }})
    runs-on: macos-latest
    strategy:
      fail-fast: false
      matrix:
        node-version: ["20", "22"]
    defaults:
      run:
        working-directory: typescript-angular-skeleton
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
      - name: Install dependencies
        run: npm install
      - name: Build TypeScript project
        run: npm run build
      - name: Smoke test CLI
        run: node dist/cli/magnetar-cli.js about
      - name: Upload build artifacts on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: test-artifacts-macos-node${{ matrix.node-version }}
          path: |
            typescript-angular-skeleton/dist
            typescript-angular-skeleton/npm-debug.log
          if-no-files-found: warn
