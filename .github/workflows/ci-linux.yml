name: CI (Linux)

on:
  push:
    branches:
      - "ci/**"
      - "master"
  pull_request:
    branches:
      - "ci/**"
      - "master"

permissions:
  contents: read

jobs:
  test:
    name: Test (linux, node${{ matrix.node-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node-version: ["20", "22"]
    defaults:
      run:
        working-directory: apps/magnetar-ui
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
      - name: Install dependencies
        run: npm ci --include=dev
      - name: Build TypeScript project
        run: npm run build:cli
      - name: Smoke test CLI
        run: node dist/cli/magnetar-cli.js about
      - name: Upload build artifacts on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: test-artifacts-linux-node${{ matrix.node-version }}
          path: |
            apps/magnetar-ui/dist
            apps/magnetar-ui/npm-debug.log
          if-no-files-found: warn
