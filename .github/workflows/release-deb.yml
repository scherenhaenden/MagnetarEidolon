name: Package DEB

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  package-deb:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Build SDK and CLI
        run: |
          npm --prefix packages/magnetar-sdk ci --include=dev
          npm --prefix packages/magnetar-sdk run build
          npm --prefix apps/magnetar-ui ci --include=dev
          npm --prefix apps/magnetar-ui run build:cli

      - name: Build DEB structure
        run: |
          VERSION="$(node -p "require('./apps/magnetar-ui/package.json').version")"
          PKG_ROOT="dist/deb/magnetar-cli_${VERSION}_amd64"
          mkdir -p "$PKG_ROOT/DEBIAN" "$PKG_ROOT/usr/local/lib/magnetar-cli" "$PKG_ROOT/usr/local/bin"
          cp -R apps/magnetar-ui/dist "$PKG_ROOT/usr/local/lib/magnetar-cli/"
          cp -R apps/magnetar-ui/node_modules "$PKG_ROOT/usr/local/lib/magnetar-cli/"
          printf '#!/usr/bin/env bash\nnode /usr/local/lib/magnetar-cli/dist/cli/magnetar-cli.js "$@"\n' > "$PKG_ROOT/usr/local/bin/magnetar-cli"
          chmod +x "$PKG_ROOT/usr/local/bin/magnetar-cli"
          printf 'Package: magnetar-cli\nVersion: %s\nSection: utils\nPriority: optional\nArchitecture: amd64\nMaintainer: MagnetarEidolon\nDepends: nodejs\nDescription: Magnetar CLI package generated by CI\n' "$VERSION" > "$PKG_ROOT/DEBIAN/control"
          dpkg-deb --build "$PKG_ROOT"

      - name: Test unpacked DEB payload
        run: |
          mkdir -p dist/deb/extract
          dpkg-deb -x dist/deb/*.deb dist/deb/extract
          bash dist/deb/extract/usr/local/bin/magnetar-cli about

      - name: Upload DEB artifact
        uses: actions/upload-artifact@v4
        with:
          name: magnetar-deb
          path: dist/deb/*.deb
