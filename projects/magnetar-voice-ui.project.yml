metadata:
  project_name: "MagnetarEidolon Voice Interface"
  description: "A voice interaction track re-scoped for the TypeScript/Angular workspace. The original Python/Gradio/Poetry prototype has been retired. All voice work now targets apps/magnetar-ui, apps/magnetar-api, and packages/magnetar-sdk."
  version: "0.2.0"
  start_date: "2024-05-22"
  repository: "https://github.com/scherenhaenden/MagnetarEidolon"

stakeholders:
  - name: "Project Lead"
    role: "Architect & Owner"
    contact: "lead@example.com"
  - name: "Jules"
    role: "Developer"
    id: "Jules"

milestones:
  - id: "ms-voice-01"
    name: "Voice Interaction Re-scope"
    target_date: "2026-03-31"
    description: "Reframe the legacy voice track for the TypeScript UI, then implement browser-compatible capture and transcription flows."
    status: "in_progress"

tasks:
  - id: "task-voice-101"
    milestone_id: "ms-voice-01"
    title: "Re-scope voice UI foundations for the TypeScript workspace"
    owner: "Jules"
    status: "in_review"
    notes: "Architecture, module boundaries, SDK interface contracts, browser/runtime constraints, risk mitigations, and testing strategy are now documented in projects/voice-ui-module/. All Python/Gradio/Poetry assumptions have been removed from the voice roadmap."
  - id: "task-voice-102"
    milestone_id: "ms-voice-01"
    title: "Implement voice capture and interaction flow in the TypeScript UI"
    owner: "Jules"
    status: "planned"
    notes: "Planned implementation task. It remains blocked until task-voice-101 is accepted and moved from in_review to done. Implementation must then follow projects/voice-ui-module/ARCHITECTURE.md and REQUIREMENTS.md. No Python, Gradio, or Poetry dependencies are permitted anywhere in the voice feature path."

risks:
  - id: "risk-voice-001"
    description: "Summary only; canonical voice-risk wording lives in projects/voice-ui-module/STATUS.md. Browser microphone permissions, local-runtime constraints, and provider compatibility may complicate the first voice implementation."
    probability: "High"
    impact: "Medium"
    mitigation: "Design the feature for browser-safe capture first, keep adapters isolated, and allow staged validation with mocked or file-based audio inputs."
  - id: "risk-voice-002"
    description: "Summary only; canonical voice-risk wording lives in projects/voice-ui-module/STATUS.md. The SpeechRecognition API is not universally supported (absent in Firefox as of early 2026), which may require backend-routed transcription earlier than planned."
    probability: "Medium"
    impact: "Medium"
    mitigation: "BrowserSpeechTranscriptionAdapter.isSupported() guard is defined from the start; the backend adapter interface is in the SDK contract so the upgrade path is non-breaking."
  - id: "risk-voice-003"
    description: "Summary only; canonical voice-risk wording lives in projects/voice-ui-module/STATUS.md. External STT providers require API keys and may have rate limits or regional restrictions that complicate first integration."
    probability: "Medium"
    impact: "Low"
    mitigation: "Browser-native path delivers the first working feature without any external provider. Backend-routed STT remains an optional upgrade behind the TranscriptionPort interface."
  - id: "risk-voice-004"
    description: "Summary only; canonical voice-risk wording lives in projects/voice-ui-module/STATUS.md. Microphone capture inside CI/test environments will fail without hardware; unguarded test code may produce flaky failures."
    probability: "High"
    impact: "Low"
    mitigation: "All capture APIs are abstracted behind injectable interfaces with mock implementations; file-based upload covers the CI path."

reporting:
  frequency: "On Completion"
  format: "Markdown via STATUS.md"
